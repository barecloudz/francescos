# Catch-all API redirect (must be before SPA fallback)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = false

# Static assets with long cache
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200
  headers = {Cache-Control = "public, max-age=31536000, immutable"}

[[redirects]]
  from = "/*.js"
  to = "/:splat.js"
  status = 200
  headers = {Cache-Control = "public, max-age=31536000, immutable"}

[[redirects]]
  from = "/*.css"
  to = "/:splat.css"
  status = 200
  headers = {Cache-Control = "public, max-age=31536000, immutable"}

