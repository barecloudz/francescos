[build]
  command = "npm ci --production=false --audit=false --fund=false && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_CONFIG_FUND = "false"
  NPM_CONFIG_AUDIT = "false"
  DISABLE_OPENCOLLECTIVE = "true"
  SECRETS_SCAN_ENABLED = "false"
  NODE_OPTIONS = "--max-old-space-size=4096"
  NETLIFY_USE_YARN = "false"
  NODE_ENV = "production"
  NPM_CONFIG_PREFER_OFFLINE = "true"
  NPM_CONFIG_NO_PROGRESS = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Old domain redirect
[[redirects]]
  from = "https://francescosmyrtlebeach.com/*"
  to = "https://francescosmurrellsinlet.com/:splat"
  status = 301
  force = true

# SEO page redirects from old Asheville site
[[redirects]]
  from = "/best-pizza-asheville-2024.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/menu-items/grandmascaprese.html"
  to = "/menu"
  status = 301
  force = true

[[redirects]]
  from = "/about.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/cateringfunnel.html"
  to = "/catering"
  status = 301
  force = true

[[redirects]]
  from = "/book.html"
  to = "/catering"
  status = 301
  force = true

[[redirects]]
  from = "/careers"
  to = "https://www.indeed.com/viewjob?jk=a445a51d70ab1f35"
  status = 301
  force = true

[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000
